version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: kiraTakip_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kiratakip}
      POSTGRES_USER: ${POSTGRES_USER:-kiratakip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiratakip123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5436:5432"
    networks:
      - kiratakip_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kiratakip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiraTakip_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-kiratakip}:${POSTGRES_PASSWORD:-kiratakip123}@db:5432/${POSTGRES_DB:-kiratakip}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kiratakip_net
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: kiraTakip_web
    restart: unless-stopped
    networks:
      - kiratakip_net

  nginx:
    image: nginx:alpine
    container_name: kiraTakip_nginx
    restart: unless-stopped
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - kiratakip_net

volumes:
  postgres_data:
  uploads_data:

networks:
  kiratakip_net:
    driver: bridge
